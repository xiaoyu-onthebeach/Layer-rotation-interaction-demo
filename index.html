<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotation Interaction Prototype</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="scene">
    <!-- Top bar -->
    <div id="scene-top">
      <span id="scene-title">Scene name</span>
      <div class="scene-top-right">
        <button id="group-toggle">Group of layers</button>
        <button id="scene-close" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2L14 14M14 2L2 14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Canvas -->
    <div id="canvas-area">
      <div id="grid-bg"></div>

      <div id="layer-wrapper">
<div id="layer-img">
          <img id="layer-placeholder" src="blue_3.png" alt="Image layer">
        </div>

        <svg id="bbox-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" overflow="visible">
          <rect x="0" y="0" width="220" height="220"
            fill="none" stroke="#4570FF" stroke-width="1.2"/>
          <rect x="-4"  y="-4"   width="8" height="8" fill="white" stroke="#4570FF" stroke-width="1.2" rx="1"/>
          <rect x="216" y="-4"   width="8" height="8" fill="white" stroke="#4570FF" stroke-width="1.2" rx="1"/>
          <rect x="216" y="216"  width="8" height="8" fill="white" stroke="#4570FF" stroke-width="1.2" rx="1"/>
          <rect x="-4"  y="216"  width="8" height="8" fill="white" stroke="#4570FF" stroke-width="1.2" rx="1"/>
          <rect x="106" y="-4"   width="8" height="8" fill="white" stroke="#4570FF" stroke-width="1.2" rx="1"/>
          <rect x="106" y="216"  width="8" height="8" fill="white" stroke="#4570FF" stroke-width="1.2" rx="1"/>
          <rect x="-4"  y="106"  width="8" height="8" fill="white" stroke="#4570FF" stroke-width="1.2" rx="1"/>
          <rect x="216" y="106"  width="8" height="8" fill="white" stroke="#4570FF" stroke-width="1.2" rx="1"/>
        </svg>

        <div class="rot-zone" id="rz-top"    data-zone="top"></div>
        <div class="rot-zone" id="rz-right"  data-zone="right"></div>
        <div class="rot-zone" id="rz-bottom" data-zone="bottom"></div>
        <div class="rot-zone" id="rz-left"   data-zone="left"></div>
        <div class="rot-zone" id="rz-nw"     data-zone="nw"></div>
        <div class="rot-zone" id="rz-ne"      data-zone="ne"></div>
        <div class="rot-zone" id="rz-se"      data-zone="se"></div>
        <div class="rot-zone" id="rz-sw"      data-zone="sw"></div>

        <div class="scale-zone" id="sz-n"  data-dir="n"  style="cursor:n-resize;"></div>
        <div class="scale-zone" id="sz-s"  data-dir="s"  style="cursor:s-resize;"></div>
        <div class="scale-zone" id="sz-w"  data-dir="w"  style="cursor:w-resize;"></div>
        <div class="scale-zone" id="sz-e"  data-dir="e"  style="cursor:e-resize;"></div>
        <div class="scale-zone" id="sz-nw" data-dir="nw" style="cursor:nw-resize;"></div>
        <div class="scale-zone" id="sz-ne" data-dir="ne" style="cursor:ne-resize;"></div>
        <div class="scale-zone" id="sz-se" data-dir="se" style="cursor:se-resize;"></div>
        <div class="scale-zone" id="sz-sw" data-dir="sw" style="cursor:sw-resize;"></div>
      </div>
    </div>
  </div>

  <!-- Layer pill — fixed, repositioned by JS above the layer AABB -->
  <div id="layer-pill">
    <button id="layer-pill-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M8 2.5L13.5 5.5L8 8.5L2.5 5.5L8 2.5Z" fill="white"/>
        <path d="M2.5 8.5L8 11.5L13.5 8.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2.5 11.5L8 14.5L13.5 11.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Ungroup</span>
    </button>
  </div>

  <!-- Custom rotation cursor — fixed, follows mouse via JS -->
  <div id="custom-cursor" aria-hidden="true">
    <svg id="cursor-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1.76745 10.3792C1.77874 9.66671 2.64607 9.32359 3.14209 9.83526L4.6365 11.3766C8.77364 7.29982 15.3843 7.26488 19.4479 11.3167L19.5222 11.3917L20.9704 9.97483C21.4799 9.47683 22.337 9.84324 22.3292 10.5558L22.2822 14.8942C22.2774 15.336 21.9154 15.6909 21.4737 15.6861L17.1339 15.6391C16.4214 15.6311 16.0743 14.766 16.5836 14.2676L18.0828 12.7994L18.0262 12.7425C14.7314 9.45727 9.36801 9.48893 6.01792 12.8016L7.4138 14.2411C7.90978 14.7527 7.53976 15.6089 6.82741 15.5982L2.48795 15.5311C2.04617 15.5242 1.69349 15.1604 1.70035 14.7186L1.76745 10.3792Z" fill="black"/>
      <path d="M4.72757 9.3159C9.08413 5.96803 15.1798 5.94718 19.4746 9.33836L19.9219 8.90184C21.3875 7.46953 23.8511 8.5247 23.8291 10.5718L23.7823 14.9106C23.7684 16.179 22.7286 17.1997 21.4571 17.186L17.1172 17.1391C15.0678 17.1163 14.071 14.6281 15.5342 13.1958L15.8399 12.896C13.5554 11.4228 10.5663 11.4289 8.23538 12.9341L8.49027 13.1968C9.91566 14.6673 8.8534 17.1289 6.80472 17.0981L2.46488 17.0307C1.19484 17.011 0.180757 15.9656 0.200227 14.6958L0.26761 10.3559C0.299406 8.37055 2.64026 7.38417 4.08206 8.66063L4.21878 8.79149L4.72757 9.3159ZM19.4479 11.3167C15.3843 7.26488 8.77364 7.29982 4.6365 11.3766L3.14209 9.83526C2.64607 9.32359 1.77874 9.66671 1.76745 10.3792L1.70035 14.7186C1.69349 15.1604 2.04617 15.5242 2.48795 15.5311L6.82741 15.5982C7.4953 15.6082 7.86267 14.8559 7.4971 14.3403L7.4138 14.2411L6.01792 12.8016C9.36801 9.48893 14.7314 9.45727 18.0262 12.7425L18.0828 12.7994L16.5836 14.2676C16.0743 14.766 16.4214 15.6311 17.1339 15.6391L21.4737 15.6861C21.8878 15.6906 22.232 15.379 22.2774 14.9761L22.2822 14.8942L22.3292 10.5558C22.337 9.84324 21.4799 9.47683 20.9704 9.97483L19.5222 11.3917L19.4479 11.3167Z" fill="white"/>
    </svg>
  </div>

  <!-- Angle degree pill — fixed, tracks cursor position -->
  <div id="angle-pill" aria-live="polite">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M6.43115 2.04007C6.61646 1.9769 6.8198 1.98915 6.99658 2.07328C7.17326 2.15756 7.30977 2.30756 7.37744 2.49125C7.44511 2.67503 7.43879 2.87787 7.35889 3.05668L4.99658 8.00394C7.15106 8.33877 8.80029 10.2019 8.80029 12.4502C8.80029 12.4639 8.79989 12.4776 8.79932 12.4912H13.2485C13.4475 12.4912 13.639 12.5703 13.7798 12.711C13.9205 12.8517 13.9995 13.0432 13.9995 13.2422C13.9994 13.4411 13.9203 13.6319 13.7798 13.7725C13.6391 13.9131 13.4475 13.9922 13.2485 13.9922H4.57764C4.1418 13.9905 3.71266 13.8795 3.33154 13.668C2.95039 13.4565 2.62903 13.1513 2.39697 12.7823C2.1649 12.4131 2.02986 11.991 2.00439 11.5557C1.97899 11.1205 2.06406 10.6856 2.25146 10.292L6.00439 2.41117C6.09286 2.23669 6.24606 2.10335 6.43115 2.04007ZM3.59619 10.9375C3.52796 11.0843 3.49261 11.2445 3.4917 11.4063C3.49223 11.6939 3.60656 11.9706 3.81006 12.1739C4.01358 12.377 4.29008 12.4911 4.57764 12.4912H7.29932C7.29989 12.4776 7.30029 12.4639 7.30029 12.4502C7.30029 10.7954 5.96017 9.45356 4.30615 9.45023L3.59619 10.9375Z" fill="white"/>
    </svg>
    <span id="pill-text">0°</span>
  </div>

  <script type="module" src="src/rotation.js"></script>
</body>
</html>
